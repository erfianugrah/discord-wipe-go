name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go vet ./...
      - run: go test ./... -count=1 -race
      - run: CGO_ENABLED=0 go build -o /dev/null ./cmd/discord-wipe/

  docker-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: docker build -t discord-wipe:smoke .
      - run: docker run --rm discord-wipe:smoke --help
